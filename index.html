
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人静态网页</title>
    <style>
        /* 基础样式设定 */
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* 导航栏 */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }

        /* 容器布局 */
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            background: #3498db;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background: #2980b9;
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到我的网站</h1>
    </header>

    <div class="container">
        <h2>关于本页面</h2>
        <p>这是一个使用 HTML5 和 CSS3 构建的静态网页示例。它具有以下特点：</p>
        <ul>
            <li><strong>响应式：</strong> 能够自动适应不同的屏幕尺寸。</li>
            <li><strong>简洁：</strong> 没有冗余的库，加载速度极快。</li>
            <li><strong>易改：</strong> 您可以随意修改 CSS 样式来改变外观。</li>
        </ul>

        <p>点击下方的按钮可以触发一个简单的 JavaScript 弹窗交互：</p>
        
        <button class="btn" onclick="showMessage()">点击我有惊喜</button>
    </div>

    <footer>
        <p>&copy; 2023 我的静态网页. 保留所有权利。</p>
    </footer>

    <script>
        // 简单的交互逻辑
        function showMessage() {
            alert('感谢您的点击！这是一个静态网页中的 JavaScript 交互。');
        }
    </script>

</body>
</html>
